<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turbo Drink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Press Start 2P', cursive; background: radial-gradient(circle at top, #ffedbc, #ff6b6b); }

    @keyframes pulseButton {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .pulse { animation: pulseButton 1.5s infinite; }

    .fruit { display: inline-block; opacity: 0.9; font-size: 1.2rem; }

    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl p-6 relative overflow-hidden">

    <h1 class="text-center text-3xl font-bold mb-4 text-gradient bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 via-red-500 to-purple-600">⚡ TURBO DRINK ⚡</h1>
    <p class="text-center text-gray-700 mb-6">Crée ton pack de 12 boissons – 33.99$ tout inclus</p>

    <div class="text-center mb-6">
      <button onclick="allerSaveurs()" class="pulse bg-gradient-to-r from-red-500 via-yellow-400 to-pink-500 text-white px-6 py-3 rounded-2xl text-lg">
        COMMANDER ⚡
      </button>
    </div>

    <div id="section-saveurs" class="w-full">
      <div class="grid grid-cols-3 gap-2 mb-4">
        <!-- Exemples de fruits avec style pixel subtil -->
        <span class="fruit">🍓</span>
        <span class="fruit">🍋</span>
        <span class="fruit">🍊</span>
        <span class="fruit">🍇</span>
        <span class="fruit">🍒</span>
      </div>

      <label class="block text-gray-700 font-semibold mb-2">CHOISIS TES SAVEURS ET QUANTITÉ (jusqu'à 12) :</label>
      <div id="saveur-list" class="grid grid-cols-1 gap-2 max-h-96 overflow-y-scroll mb-4 border-2 border-gray-400 rounded-lg p-2">
        <!-- Chaque saveur avec quantité -->
      </div>

      <div class="bg-gray-100 rounded-lg p-3 mb-4 border-2 border-gray-400">
        <p class="text-gray-700 text-xs">COMMANDE :</p>
        <p id="resume" class="text-gray-800 text-xs">AUCUNE SAVEUR</p>
        <p class="text-gray-800 text-xs mt-2">TOTAL : 33.99$</p>
      </div>

      <button onclick="commanderMessenger()" class="w-full bg-red-500 text-white rounded-xl py-3 mb-3 text-sm">MESSENGER</button>
      <button onclick="commanderSMS()" class="w-full bg-yellow-400 text-gray-900 rounded-xl py-3 text-sm">TEXTO</button>
    </div>

    <p class="text-[8px] text-gray-700 mt-4 text-center">REMPLACE LES LIENS MESSENGER ET NUMÉRO AVANT PUBLICATION</p>
  </div>

  <script>
    const saveursArray = [
      'Monster Original','Monster Ultra','Monster Mango','Monster Pipeline Punch','Monster Pacific Punch',
      'Rockstar Original','Rockstar Punched','Rockstar Blueberry','Rockstar Tropical','Red Bull Original',
      'Red Bull Tropical','Red Bull Peach','Red Bull Watermelon','Red Bull Blueberry','Monster Khaos',
      'Monster Energy Assault','Monster Energy Ultra Sunrise','Monster Energy Ultra Red','Monster Energy Ultra Black','Monster Energy Ultra Violet',
      'Monster Energy Ultra Paradise','Monster Energy Ultra Fiesta','Rockstar Energy Pomegranate','Rockstar Energy Watermelon','Rockstar Energy Citrus',
      'Rockstar Energy Guava','Rockstar Energy Pineapple','Rockstar Energy Mango','Rockstar Energy Dragonfruit','Rockstar Energy Fruit Punch',
      'Monster Energy Rehab Tea Lemonade','Monster Energy Rehab Tea Strawberry','Monster Energy Rehab Tea Peach','Monster Energy Rehab Tea Raspberry','Monster Energy Juice Monster Mango Loco',
      'Monster Energy Juice Monster Pacific Punch','Monster Energy Juice Monster Pipeline Punch','Monster Energy Juice Monster Khaos','Red Bull Summer Edition Watermelon','Red Bull Summer Edition Coconut',
      'Red Bull Summer Edition Tropical','Red Bull Summer Edition Berry','Red Bull Summer Edition Peach','Red Bull Summer Edition Lime','Rockstar Energy Sugar Free',
      'Rockstar Energy Xdurance','Rockstar Energy Juiced','Rockstar Energy Pure Zero','Monster Energy Lo-Carb','Monster Energy Import',
      'Monster Energy Ultra Fiesta','Monster Energy Ultra Blue','Monster Energy Ultra Red','Monster Energy Ultra Sunrise','Monster Energy Ultra Violet','Monster Energy Ultra Black','Monster Energy Ultra Paradise','Monster Energy Assault','Monster Energy Import Red','Monster Energy Import Mango','Monster Energy Import Pacific Punch'
    ];

    const saveurList = document.getElementById('saveur-list');

    saveursArray.forEach(s => {
      const div = document.createElement('div');
      div.className = 'flex justify-between items-center p-1 border-b border-gray-300';
      div.innerHTML = `
        <span>${s}</span>
        <input type='number' min='0' max='12' value='0' class='w-12 text-center border border-gray-400 rounded'/>
      `;
      saveurList.appendChild(div);
    });

    function updateResume() {
      const selections = [];
      saveurList.querySelectorAll('div').forEach(div => {
        const name = div.querySelector('span').textContent;
        const qty = parseInt(div.querySelector('input').value);
        if(qty>0) selections.push(`${name} x${qty}`);
      });
      resume.textContent = selections.length ? selections.join(', ') : 'AUCUNE SAVEUR';
    }

    saveurList.addEventListener('input', updateResume);

    function allerSaveurs() {
      document.getElementById('section-saveurs').scrollIntoView({ behavior: 'smooth' });
    }

    function getCommande() {
      const selections = [];
      saveurList.querySelectorAll('div').forEach(div => {
        const name = div.querySelector('span').textContent;
        const qty = parseInt(div.querySelector('input').value);
        if(qty>0) selections.push(`${name} x${qty}`);
      });
      const liste = selections.length ? selections.join(', ') : 'Mix maison';
      return encodeURIComponent(`Commande Turbo Drink - Pack personnalisé (33.99$)\nSaveurs: ${liste}`);
    }

    function commanderMessenger() {
      const msg = getCommande();
      window.open(`https://m.me/yourpage?ref=${msg}`, '_blank');
    }

    function commanderSMS() {
      const msg = getCommande();
      window.location.href = `sms:+15141234567?&body=${msg}`;
    }
  </script>
</body>
</html>
